version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: devfolio-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: devfolio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d devfolio"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: 077342897pop/devfolio-api:latest
    container_name: devfolio-api
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: