name: CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
  pull_request:

jobs:
  ci:
    name: Test, Build, and Validate
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: devfolio
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d devfolio"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      APP_ENV: test
      PORT: 8080
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: devfolio
      DB_SSLMODE: disable
      DB_TIMEZONE: Asia/Bangkok
      JWT_SECRET: test-secret
      AUTO_MIGRATE: false

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Show Go version
        run: go version

      - name: Install migrate
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.18.3/migrate.linux-amd64.tar.gz | tar xvz
          sudo mv migrate /usr/local/bin/migrate
          migrate -version

      - name: Install swag
        run: go install github.com/swaggo/swag/cmd/swag@latest

      - name: Download dependencies
        run: go mod download

      - name: Verify module files
        run: go mod tidy && git diff --exit-code -- go.mod go.sum

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U postgres -d devfolio && break
            echo "Waiting for postgres..."
            sleep 2
          done

      - name: Run database migrations
        run: |
          migrate -path migrations -database "postgres://postgres:postgres@localhost:5432/devfolio?sslmode=disable" up

      - name: Generate Swagger docs
        run: |
          swag init -g cmd/api/main.go --parseDependency --parseInternal
          test -f docs/docs.go
          test -f docs/swagger.json
          test -f docs/swagger.yaml

      - name: Run tests
        run: go test ./...

      - name: Build application
        run: go build -o bin/api ./cmd/api

      - name: Build Docker image
        run: docker build -t devfolio-api:ci .